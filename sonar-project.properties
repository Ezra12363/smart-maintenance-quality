sonar.projectKey=smart-maintenance-quality
# sonar.organization=votre-org  # Set via GitHub app/SonarCloud UI after first bind
sonar.projectName=SmartMaintenance Spaghetti
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.exclusions=node_modules/**, .git/**, coverage/**, **/*.test.js, **/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate: Complexity >15, Coverage <70% expected fail
sonar.qualitygate.wait=true

